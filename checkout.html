<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/png" href="assets/logo-favicon.png">
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout | The Gold Index Club</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --bg-card: #111111;
      --border: #1e1e1e;
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --text-primary: #f0f0f0;
      --text-muted: #888888;
      --error: #ef5350;
      --container: 540px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html {
      overflow-x: hidden;
      max-width: 100%;
    }
    body {
      min-height: 100vh;
      background: radial-gradient(circle at 50% -20%, rgba(201,168,76,0.1), transparent 42%), var(--bg);
      color: var(--text-primary);
      font-family: "DM Mono", monospace;
      line-height: 1.55;
      display: flex;
      flex-direction: column;
      overflow-x: hidden;
      max-width: 100%;
      position: relative;
    }
    a { color: var(--gold-light); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .topbar {
      border-bottom: 1px solid var(--border);
      background: rgba(8,8,8,0.94);
      backdrop-filter: blur(10px);
      padding: 0 1rem;
    }
    .topbar-inner {
      max-width: var(--container);
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      min-height: 56px;
    }
    .brand {
      font-family: "Cormorant Garamond", serif;
      color: var(--gold-light);
      font-size: 1.05rem;
      letter-spacing: 0.06em;
      text-decoration: none;
    }

    .topbar-links {
      display: flex;
      align-items: center;
      gap: 1.75rem;
    }

    .topbar-nav-item {
      box-sizing: border-box;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 2.5rem;
      padding: 0;
      margin: 0;
      font-size: 0.72rem;
      line-height: 1;
      color: #c8c8c8;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      font-family: inherit;
      text-decoration: underline;
      text-decoration-color: rgba(201, 168, 76, 0.5);
      text-underline-offset: 6px;
      text-decoration-thickness: 1px;
      background: none;
      border: none;
      cursor: pointer;
      -webkit-appearance: none;
      appearance: none;
      vertical-align: middle;
    }

    a.topbar-nav-item {
      color: #c8c8c8;
    }

    .topbar-nav-item:hover {
      color: var(--gold-light);
      text-decoration-color: var(--gold-light);
    }

    .page {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      width: 100%;
      max-width: var(--container);
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 2rem 1.5rem;
      text-align: left;
    }

    .checkout-hero {
      text-align: center;
      margin-bottom: 1.35rem;
    }

    h1.checkout-title {
      font-family: "Cormorant Garamond", serif;
      font-size: 1.85rem;
      font-weight: 600;
      line-height: 1.2;
      margin: 0;
      color: var(--text-primary);
      letter-spacing: 0.02em;
    }

    .lead {
      color: var(--text-muted);
      font-size: 0.82rem;
      margin: 1rem 0 0;
      text-align: center;
      line-height: 1.5;
      max-width: 34rem;
      margin-left: auto;
      margin-right: auto;
    }

    @media (min-width: 769px) {
      .card--checkout {
        padding: 2.25rem 2.25rem 2rem;
      }

      h1.checkout-title {
        font-size: 2.05rem;
      }

      .checkout-hero {
        margin-bottom: 1.5rem;
      }
    }

    .field { margin-bottom: 0.85rem; text-align: left; }
    .field label {
      display: block;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #aaa;
      margin-bottom: 0.35rem;
    }
    .field input {
      width: 100%;
      padding: 0.65rem 0.8rem;
      background: #0a0a0a;
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-primary);
      font-family: inherit;
      font-size: 0.88rem;
      outline: none;
    }
    .field input:focus { border-color: rgba(201,168,76,0.55); }

    .btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      padding: 0.85rem 1.6rem;
      border: 1px solid var(--gold);
      border-radius: 8px;
      background: #0d0d0d;
      color: var(--gold-light);
      font-family: inherit;
      font-size: 0.82rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 180ms ease, box-shadow 200ms ease, transform 180ms ease;
      animation: pulseGold 3s ease-in-out infinite;
    }
    .btn:hover {
      border-color: var(--gold-light);
      box-shadow: 0 0 26px rgba(201,168,76,0.26);
      transform: translateY(-2px);
    }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; box-shadow: none; animation: none; }

    @keyframes pulseGold {
      0%, 100% { box-shadow: 0 0 0 rgba(201,168,76,0.12); }
      50% { box-shadow: 0 0 20px rgba(201,168,76,0.28); }
    }

    .error-msg {
      color: var(--error);
      font-size: 0.78rem;
      margin-bottom: 1rem;
      min-height: 1.2em;
      text-align: left;
    }

    .micro {
      margin-top: 1rem;
      font-size: 0.65rem;
      color: #6a6a6a;
      line-height: 1.45;
      text-align: center;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(232,201,122,0.3);
      border-top-color: var(--gold-light);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 0.5rem;
      vertical-align: middle;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { display: none !important; }
    .alt {
      text-align: center;
      margin-top: 1rem;
      font-size: 0.75rem;
      color: var(--text-muted);
    }

    #memberBlock:not(.hidden) .lead {
      margin-top: 0.25rem;
    }

    .checkout-loading {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.82rem;
      margin: 0.35rem 0 1.25rem;
    }

    #guestForm .btn {
      align-self: center;
    }

    #guestForm {
      display: flex;
      flex-direction: column;
    }

    #memberBlock {
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    #memberBlock .error-msg {
      width: 100%;
      text-align: center;
    }
  </style>
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <a class="brand" href="/">The Gold Index Club</a>
      <nav class="topbar-links" aria-label="Site">
        <a class="topbar-nav-item" href="/">Home</a>
        <a class="topbar-nav-item" href="account.html">Account</a>
      </nav>
    </div>
  </header>

  <main class="page">
    <div class="card card--checkout">
      <div class="checkout-hero">
        <h1 class="checkout-title">Subscribe — R150/month</h1>
      </div>

      <p id="checkoutLoading" class="checkout-loading">Loading…</p>

      <!-- Guest pay-first (shown only when not signed in — after session check) -->
      <div id="guestBlock" class="hidden">
        <p class="lead">Pay with Paystack, then create your password on the next screen (same email).</p>
        <div class="error-msg" id="errorMsgGuest"></div>
        <form id="guestForm">
          <div class="field">
            <label for="gName">Full name</label>
            <input id="gName" type="text" required autocomplete="name" placeholder="Your name" />
          </div>
          <div class="field">
            <label for="gPhone">WhatsApp number (for your group invite)</label>
            <input id="gPhone" type="tel" required autocomplete="tel" placeholder="+27 82 123 4567" />
          </div>
          <div class="field">
            <label for="gEmail">Email</label>
            <input id="gEmail" type="email" required autocomplete="email" placeholder="you@example.com" />
          </div>
          <button class="btn" type="submit" id="guestPayBtn">Continue to secure payment &rarr;</button>
        </form>
        <p class="alt">Already have an account? <a href="login.html">Log in</a> to pay from your dashboard.</p>
      </div>

      <!-- Logged-in existing flow -->
      <div id="memberBlock" class="hidden">
        <p class="lead">Continue to Paystack to subscribe or renew.</p>
        <div class="error-msg" id="errorMsgMember"></div>
        <button class="btn" id="memberPayBtn" type="button">Pay R150 &amp; Join &rarr;</button>
      </div>

      <p class="micro">Payments processed by Paystack.</p>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script>
    const { createClient } = supabase;
    const sb = createClient(TGIC_CONFIG.SUPABASE_URL, TGIC_CONFIG.SUPABASE_ANON_KEY);

    const guestBlock = document.getElementById("guestBlock");
    const memberBlock = document.getElementById("memberBlock");
    const guestForm = document.getElementById("guestForm");
    const guestPayBtn = document.getElementById("guestPayBtn");
    const memberPayBtn = document.getElementById("memberPayBtn");
    const errorMsgGuest = document.getElementById("errorMsgGuest");
    const errorMsgMember = document.getElementById("errorMsgMember");

    const callbackUrl = window.location.origin.replace(/\/$/, "") + "/signup.html";
    const checkoutLoading = document.getElementById("checkoutLoading");

    function hideCheckoutLoading() {
      if (checkoutLoading) checkoutLoading.classList.add("hidden");
    }

    async function boot() {
      try {
        const { data: { session } } = await sb.auth.getSession();

        if (session) {
          const { data: profile } = await sb
            .from("profiles")
            .select("subscription_status")
            .eq("id", session.user.id)
            .single();

          if (profile?.subscription_status === "active") {
            window.location.href = TGIC_CONFIG.ACCOUNT_URL;
            return;
          }

          hideCheckoutLoading();
          guestBlock.classList.add("hidden");
          memberBlock.classList.remove("hidden");

          memberPayBtn.addEventListener("click", async () => {
            memberPayBtn.disabled = true;
            memberPayBtn.innerHTML = '<span class="spinner"></span>Redirecting…';
            errorMsgMember.textContent = "";
            try {
              const base = window.location.origin.replace(/\/$/, "");
              const accountPath = TGIC_CONFIG.ACCOUNT_URL.replace(/^\//, "");
              const res = await sb.functions.invoke("create-subscription", {
                headers: { "x-callback-url": base + "/" + accountPath },
              });
              if (res.error) throw new Error(res.error.message || "Function error");
              const result = res.data;
              if (result.authorization_url) {
                window.location.href = result.authorization_url;
              } else {
                throw new Error(result.error || "No payment URL received");
              }
            } catch (err) {
              errorMsgMember.textContent = err.message || "Something went wrong.";
              memberPayBtn.disabled = false;
              memberPayBtn.innerHTML = "Pay R150 &amp; Join &rarr;";
            }
          });
          return;
        }
      } catch (e) {
        console.error(e);
      }

      hideCheckoutLoading();
      guestBlock.classList.remove("hidden");
      memberBlock.classList.add("hidden");

      guestForm.addEventListener("submit", async (e) => {
        e.preventDefault();
        errorMsgGuest.textContent = "";
        guestPayBtn.disabled = true;
        guestPayBtn.innerHTML = '<span class="spinner"></span>Starting checkout…';

        const full_name = document.getElementById("gName").value.trim();
        const phone_number = document.getElementById("gPhone").value.trim();
        const email = document.getElementById("gEmail").value.trim().toLowerCase();

        try {
          const res = await sb.functions.invoke("create-guest-checkout", {
            body: {
              email,
              full_name,
              phone_number,
              callback_url: callbackUrl,
            },
          });

          if (res.error) throw new Error(res.error.message || "Could not start checkout");

          const result = res.data;
          if (result.error) throw new Error(result.error + (result.detail ? " — " + JSON.stringify(result.detail) : ""));

          if (result.reference) {
            try {
              sessionStorage.setItem("tgic_pay_ref", result.reference);
            } catch (ignore) {}
          }

          if (result.authorization_url) {
            window.location.href = result.authorization_url;
          } else {
            throw new Error("No payment URL received");
          }
        } catch (err) {
          errorMsgGuest.textContent = err.message || "Something went wrong.";
          guestPayBtn.disabled = false;
          guestPayBtn.innerHTML = "Continue to secure payment &rarr;";
        }
      });
    }

    boot();
  </script>
</body>
</html>
