# Calls run-scheduled-member-emails at 06:00 UTC (= 08:00 South Africa standard time, SAST).
# Add repo secrets: SUPABASE_URL, SUPABASE_ANON_KEY, TGIC_EMAIL_SERVER_SECRET
# Deploy the Edge Function first and set the same TGIC_EMAIL_SERVER_SECRET in Supabase → Edge Functions → Secrets.

name: Scheduled member payment emails

on:
  schedule:
    - cron: "0 6 * * *"
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - name: Invoke run-scheduled-member-emails
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
          TGIC_EMAIL_SERVER_SECRET: ${{ secrets.TGIC_EMAIL_SERVER_SECRET }}
        run: |
          set -e
          URL="${SUPABASE_URL%/}/functions/v1/run-scheduled-member-emails"
          curl -sS -X POST "$URL" \
            -H "Authorization: Bearer ${TGIC_EMAIL_SERVER_SECRET}" \
            -H "apikey: ${SUPABASE_ANON_KEY}" \
            -H "Content-Type: application/json" \
            -d '{}'
