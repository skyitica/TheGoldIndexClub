<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/png" href="assets/logo-favicon.png">
  <title>Admin | The Gold Index Club</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0a;
      --card: #111111;
      --border: #242424;
      --text: #f0f0f0;
      --muted: #9a9a9a;
      --gold: #c9a84c;
      --green: #81c784;
      --red: #ef5350;
      --amber: #fbc02d;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: radial-gradient(circle at 50% -20%, rgba(201,168,76,0.1), transparent 42%), var(--bg);
      color: var(--text);
      font-family: "DM Mono", monospace;
      line-height: 1.45;
      padding: 1.2rem;
    }
    .wrap { width: min(1200px, 100%); margin: 0 auto; }
    h1 {
      font-family: "Cormorant Garamond", serif;
      font-size: clamp(1.6rem, 3vw, 2.2rem);
      margin-bottom: 0.35rem;
      color: #f6f6f6;
    }
    .muted { color: var(--muted); font-size: 0.78rem; margin-bottom: 1rem; }
    .summary {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 0.75rem;
      margin-bottom: 1rem;
    }
    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
      margin-bottom: 0.85rem;
    }
    .filter-btn {
      border: 1px solid var(--border);
      background: #111;
      color: #cfcfcf;
      border-radius: 999px;
      font-family: inherit;
      font-size: 0.66rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 0.38rem 0.62rem;
      cursor: pointer;
    }
    .filter-btn.is-active {
      border-color: rgba(201, 168, 76, 0.7);
      color: #ecd38f;
      background: rgba(201, 168, 76, 0.1);
    }
    .card {
      border: 1px solid var(--border);
      border-radius: 10px;
      background: var(--card);
      padding: 0.8rem;
    }
    .kpi-label {
      font-size: 0.67rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .kpi-value {
      margin-top: 0.35rem;
      font-size: 1.5rem;
      color: #fff;
    }
    .table-wrap {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: auto;
      background: #0d0d0d;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1320px;
    }
    th, td {
      padding: 0.4rem 0.45rem;
      border-bottom: 1px solid var(--border);
      text-align: left;
      font-size: 0.68rem;
      vertical-align: middle;
      white-space: nowrap;
      line-height: 1.2;
    }
    th {
      color: #d9d9d9;
      font-size: 0.66rem;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      background: #121212;
      position: sticky;
      top: 0;
    }
    .status-badge {
      display: inline-block;
      border-radius: 999px;
      padding: 0.2rem 0.48rem;
      font-size: 0.64rem;
      border: 1px solid currentColor;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }
    .status-paid { color: var(--green); }
    .status-overdue { color: var(--red); }
    .status-pending { color: var(--amber); }
    .btn {
      border: 1px solid rgba(201, 168, 76, 0.5);
      background: transparent;
      color: #ecd38f;
      border-radius: 8px;
      font-family: inherit;
      font-size: 0.6rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      padding: 0.25rem 0.4rem;
      cursor: pointer;
    }
    .btn:hover { border-color: #ecd38f; }
    .btn + .btn { margin-left: 0.35rem; }
    .notice {
      margin-top: 0.8rem;
      font-size: 0.74rem;
      color: var(--muted);
      min-height: 1.2em;
    }
    @media (max-width: 980px) {
      .summary { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
    @media (max-width: 560px) {
      .summary { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="wrap" id="adminApp" style="display:none;">
    <h1>Members Admin</h1>
    <p class="muted">Manual EFT member tracking dashboard.</p>

    <section class="summary">
      <div class="card"><p class="kpi-label">Total members</p><p class="kpi-value" id="kpiTotal">0</p></div>
      <div class="card"><p class="kpi-label">Paid this month</p><p class="kpi-value" id="kpiPaidMonth">0</p></div>
      <div class="card"><p class="kpi-label">Pending</p><p class="kpi-value" id="kpiPending">0</p></div>
      <div class="card"><p class="kpi-label">Overdue</p><p class="kpi-value" id="kpiOverdue">0</p></div>
    </section>

    <section class="filters" aria-label="Member filters">
      <button class="filter-btn is-active" data-filter="all" type="button">All</button>
      <button class="filter-btn" data-filter="new" type="button">New Members</button>
      <button class="filter-btn" data-filter="overdue" type="button">Overdue</button>
      <button class="filter-btn" data-filter="paid" type="button">Members Who Have Paid</button>
    </section>

    <section class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>WhatsApp</th>
            <th>Join Date</th>
            <th>Next Due</th>
            <th>Date Paid</th>
            <th>Status</th>
            <th>Group Access</th>
            <th>Extension Request</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="membersBody"></tbody>
      </table>
    </section>
    <p class="notice" id="notice"></p>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
  <script src="js/config.js"></script>
  <script>
    const ADMIN_PASSWORD = "179317";
    const entered = window.prompt("Enter admin password");
    if (entered !== ADMIN_PASSWORD) {
      window.location.replace("/");
    } else {
      document.getElementById("adminApp").style.display = "block";
    }

    const { createClient } = supabase;
    const sb = createClient(TGIC_CONFIG.SUPABASE_URL, TGIC_CONFIG.SUPABASE_ANON_KEY);

    const membersBody = document.getElementById("membersBody");
    const notice = document.getElementById("notice");
    const kpiTotal = document.getElementById("kpiTotal");
    const kpiPaidMonth = document.getElementById("kpiPaidMonth");
    const kpiPending = document.getElementById("kpiPending");
    const kpiOverdue = document.getElementById("kpiOverdue");
    const filterButtons = Array.from(document.querySelectorAll(".filter-btn"));
    let activeFilter = "all";
    let allRowsCache = [];

    function dateOnlyString(date) {
      return date.toISOString().slice(0, 10);
    }

    function monthPrefix(date) {
      return date.toISOString().slice(0, 7);
    }

    function deriveStatus(member, todayStr) {
      if (member.next_due_date && member.next_due_date <= todayStr) return "Overdue";
      const raw = (member.status || "Pending").toLowerCase();
      if (raw === "paid") return "Paid";
      return "Pending";
    }

    function statusClass(status) {
      if (status === "Paid") return "status-paid";
      if (status === "Overdue") return "status-overdue";
      return "status-pending";
    }

    function esc(value) {
      return String(value || "").replace(/[&<>"']/g, function (ch) {
        return ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          "\"": "&quot;",
          "'": "&#39;",
        })[ch];
      });
    }

    function addOneMonthIso(isoDate) {
      const d = new Date((isoDate || dateOnlyString(new Date())) + "T00:00:00");
      d.setMonth(d.getMonth() + 1);
      return dateOnlyString(d);
    }

    function addMonthsIso(isoDate, months) {
      const d = new Date((isoDate || dateOnlyString(new Date())) + "T00:00:00");
      d.setMonth(d.getMonth() + Number(months || 1));
      return dateOnlyString(d);
    }

    function pricingForMonths(months) {
      const m = Number(months || 1);
      const monthly = 150;
      const subtotal = monthly * m;
      let discountPercent = 0;
      if (m >= 2 && m <= 6) discountPercent = 10;
      if (m > 6) discountPercent = 25;
      const total = Math.round(subtotal * (1 - discountPercent / 100));
      return { monthly, subtotal, total, discountPercent };
    }

    async function markPaid(id) {
      const today = dateOnlyString(new Date());
      const { data: member, error: fetchErr } = await sb
        .from("members")
        .select("id, next_due_date, month_number, amount, whatsapp")
        .eq("id", id)
        .single();
      if (fetchErr || !member) throw (fetchErr || new Error("Member not found"));

      const nextDue = addOneMonthIso(member.next_due_date || today);
      const nextMonthNumber = Number(member.month_number || 1) + 1;

      let upd = await sb
        .from("members")
        .update({
          date_paid: today,
          status: "Paid",
          next_due_date: nextDue,
          month_number: nextMonthNumber,
          pending_extension: false,
          requested_extension_months: null,
          requested_extension_discount: null,
          requested_extension_total: null,
        })
        .eq("id", id);
      if (upd.error) throw upd.error;

      let payRes = await sb.from("member_payments").insert({
        member_id: id,
        paid_on: today,
        amount: member.amount || 150,
        reference: member.whatsapp || "",
        months_count: 1,
        discount_percent: 0,
        total_amount: member.amount || 150,
      });
      if (payRes.error && /column .* does not exist/i.test(payRes.error.message || "")) {
        payRes = await sb.from("member_payments").insert({
          member_id: id,
          paid_on: today,
          amount: member.amount || 150,
          reference: member.whatsapp || "",
        });
      }
      if (payRes.error) throw payRes.error;
    }

    async function extendMembership(id, months) {
      const m = Number(months || 1);
      if (!m || m < 1) throw new Error("Invalid month count.");
      const today = dateOnlyString(new Date());
      const pricing = pricingForMonths(m);

      const { data: member, error: fetchErr } = await sb
        .from("members")
        .select("id, next_due_date, month_number, whatsapp")
        .eq("id", id)
        .single();
      if (fetchErr || !member) throw (fetchErr || new Error("Member not found"));

      const baseDate = member.next_due_date && member.next_due_date > today ? member.next_due_date : today;
      const nextDue = addMonthsIso(baseDate, m);
      const nextMonthNumber = Number(member.month_number || 1) + m;

      let upd = await sb
        .from("members")
        .update({
          date_paid: today,
          status: "Paid",
          next_due_date: nextDue,
          month_number: nextMonthNumber,
          current_plan_months: m,
          last_discount_percent: pricing.discountPercent,
          last_payment_total: pricing.total,
          pending_extension: false,
          requested_extension_months: null,
          requested_extension_discount: null,
          requested_extension_total: null,
        })
        .eq("id", id);
      if (upd.error && /column .* does not exist/i.test(upd.error.message || "")) {
        upd = await sb
          .from("members")
          .update({
            date_paid: today,
            status: "Paid",
            next_due_date: nextDue,
            month_number: nextMonthNumber,
            pending_extension: false,
            requested_extension_months: null,
            requested_extension_discount: null,
            requested_extension_total: null,
          })
          .eq("id", id);
      }
      if (upd.error) throw upd.error;

      let payRes = await sb.from("member_payments").insert({
        member_id: id,
        paid_on: today,
        amount: pricing.monthly,
        reference: member.whatsapp || "",
        months_count: m,
        discount_percent: pricing.discountPercent,
        total_amount: pricing.total,
      });
      if (payRes.error && /column .* does not exist/i.test(payRes.error.message || "")) {
        payRes = await sb.from("member_payments").insert({
          member_id: id,
          paid_on: today,
          amount: pricing.total,
          reference: member.whatsapp || "",
        });
      }
      if (payRes.error) throw payRes.error;
    }

    async function reduceMembership(id, months) {
      const m = Number(months || 1);
      if (!m || m < 1) throw new Error("Invalid month count.");
      const today = dateOnlyString(new Date());

      const { data: member, error: fetchErr } = await sb
        .from("members")
        .select("id, next_due_date, month_number")
        .eq("id", id)
        .single();
      if (fetchErr || !member) throw (fetchErr || new Error("Member not found"));

      const baseDate = member.next_due_date || today;
      const d = new Date(baseDate + "T00:00:00");
      d.setMonth(d.getMonth() - m);
      const reducedDue = dateOnlyString(d);
      const nextMonthNumber = Math.max(1, Number(member.month_number || 1) - m);

      const upd = await sb
        .from("members")
        .update({
          next_due_date: reducedDue,
          month_number: nextMonthNumber,
          status: reducedDue <= today ? "past_due" : "Paid",
          pending_extension: false,
          requested_extension_months: null,
          requested_extension_discount: null,
          requested_extension_total: null,
        })
        .eq("id", id);
      if (upd.error) throw upd.error;
    }

    async function toggleAccess(id, current) {
      const { error } = await sb
        .from("members")
        .update({ group_access: !current })
        .eq("id", id);
      if (error) throw error;
    }

    function renderSummary(rows) {
      const today = new Date();
      const todayStr = dateOnlyString(today);
      const thisMonth = monthPrefix(today);

      let paidThisMonth = 0;
      let pending = 0;
      let overdue = 0;

      rows.forEach(function (row) {
        const dStatus = deriveStatus(row, todayStr);
        if (dStatus === "Pending") pending += 1;
        if (dStatus === "Overdue") overdue += 1;
        if (row.date_paid && row.date_paid.startsWith(thisMonth)) paidThisMonth += 1;
      });

      kpiTotal.textContent = String(rows.length);
      kpiPaidMonth.textContent = String(paidThisMonth);
      kpiPending.textContent = String(pending);
      kpiOverdue.textContent = String(overdue);
    }

    function renderRows(rows) {
      const todayStr = dateOnlyString(new Date());
      membersBody.innerHTML = rows.map(function (row) {
        const dStatus = deriveStatus(row, todayStr);
        const accessLabel = row.group_access ? "True" : "False";
        const accessBtnLabel = row.group_access ? "Revoke Access" : "Grant Access";
        const extensionReq = row.pending_extension
          ? ("Yes - " + (row.requested_extension_months || 1) + "m / R" + (row.requested_extension_total || "-"))
          : "No";
        return `
          <tr>
            <td>${esc(row.full_name)}</td>
            <td>${esc(row.email)}</td>
            <td>${esc(row.whatsapp)}</td>
            <td>${esc(row.join_date)}</td>
            <td>${esc(row.next_due_date)}</td>
            <td>${esc(row.date_paid || "-")}</td>
            <td><span class="status-badge ${statusClass(dStatus)}">${esc(dStatus)}</span></td>
            <td>${accessLabel}</td>
            <td>${esc(extensionReq)}</td>
            <td>
              <button class="btn js-paid" data-id="${row.id}">Mark Paid</button>
              <button class="btn js-access" data-id="${row.id}" data-current="${row.group_access ? "1" : "0"}">${accessBtnLabel}</button>
              <button class="btn js-extend" data-id="${row.id}">Extend</button>
              <button class="btn js-reduce" data-id="${row.id}">Reduce</button>
            </td>
          </tr>
        `;
      }).join("");
    }

    function isNewMember(row) {
      const todayStr = dateOnlyString(new Date());
      const dStatus = deriveStatus(row, todayStr);
      return dStatus === "Pending" && !row.group_access;
    }

    function filteredRows(rows) {
      const todayStr = dateOnlyString(new Date());
      if (activeFilter === "paid") {
        return rows.filter(function (row) {
          return deriveStatus(row, todayStr) === "Paid";
        });
      }
      if (activeFilter === "overdue") {
        return rows.filter(function (row) {
          return deriveStatus(row, todayStr) === "Overdue";
        });
      }
      if (activeFilter === "new") {
        return rows.filter(isNewMember);
      }
      return rows;
    }

    function applyActiveFilter() {
      const rows = filteredRows(allRowsCache);
      renderRows(rows);
      renderSummary(rows);
      if (!rows.length) {
        notice.textContent = "No members in this filter.";
      } else {
        notice.textContent = "";
      }
    }

    async function loadMembers() {
      notice.textContent = "Loading members...";
      const { data, error } = await sb
        .from("members")
        .select("*")
        .order("id", { ascending: false });
      if (error) {
        notice.textContent = "Could not load members: " + (error.message || "unknown error");
        return;
      }
      allRowsCache = data || [];
      applyActiveFilter();
      if (!allRowsCache.length) {
        notice.textContent = "No members yet.";
      }
    }

    membersBody.addEventListener("click", async function (e) {
      const target = e.target;
      if (!(target instanceof HTMLElement)) return;

      try {
        if (target.classList.contains("js-paid")) {
          const id = Number(target.dataset.id || "0");
          if (!id) return;
          target.setAttribute("disabled", "disabled");
          await markPaid(id);
          await loadMembers();
          notice.textContent = "Payment marked as received.";
        }

        if (target.classList.contains("js-access")) {
          const id = Number(target.dataset.id || "0");
          const current = target.dataset.current === "1";
          if (!id) return;
          target.setAttribute("disabled", "disabled");
          await toggleAccess(id, current);
          await loadMembers();
          notice.textContent = "Group access updated.";
        }
        if (target.classList.contains("js-extend")) {
          const id = Number(target.dataset.id || "0");
          if (!id) return;
          const raw = window.prompt("Extend by how many months? (1-24)", "1");
          if (raw === null) return;
          const months = Number(raw);
          if (!months || months < 1 || months > 24) {
            notice.textContent = "Enter a valid month count between 1 and 24.";
            return;
          }
          target.setAttribute("disabled", "disabled");
          await extendMembership(id, months);
          await loadMembers();
          notice.textContent = "Membership extended by " + months + " month(s).";
        }
        if (target.classList.contains("js-reduce")) {
          const id = Number(target.dataset.id || "0");
          if (!id) return;
          const raw = window.prompt("Remove how many months? (1-24)", "1");
          if (raw === null) return;
          const months = Number(raw);
          if (!months || months < 1 || months > 24) {
            notice.textContent = "Enter a valid month count between 1 and 24.";
            return;
          }
          target.setAttribute("disabled", "disabled");
          await reduceMembership(id, months);
          await loadMembers();
          notice.textContent = "Removed " + months + " month(s) from membership.";
        }
      } catch (err) {
        notice.textContent = "Update failed: " + (err.message || "unknown error");
      }
    });

    filterButtons.forEach(function (btn) {
      btn.addEventListener("click", function () {
        activeFilter = btn.getAttribute("data-filter") || "all";
        filterButtons.forEach(function (b) {
          b.classList.toggle("is-active", b === btn);
        });
        applyActiveFilter();
      });
    });

    loadMembers();
  </script>
</body>
</html>
