<!DOCTYPE html>

<head>

  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0a0a0a; --gold: #c9a84c; --gold-light: #e7cf84; --text: #f1f1f1; --muted: #a7a7a7; --border: #242424; }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: radial-gradient(circle at 50% -20%, rgba(201,168,76,0.12), transparent 42%), var(--bg); color: var(--text); font-family: "DM Mono", monospace; line-height: 1.7; }
    a { color: var(--gold-light); text-underline-offset: 3px; }
    .container { width: min(100% - 2rem, 760px); margin-inline: auto; }
    header { border-bottom: 1px solid var(--border); background: rgba(8,8,8,0.92); backdrop-filter: blur(8px); position: sticky; top: 0; z-index: 20; }
    .topbar { min-height: 64px; display: flex; align-items: center; justify-content: space-between; gap: 1rem; }
    .brand { font-family: "Cormorant Garamond", serif; color: var(--gold-light); letter-spacing: 0.05em; font-size: 1.08rem; text-decoration: none; }
    .back { font-size: 0.68rem; letter-spacing: 0.1em; text-transform: uppercase; color: #b7b7b7; text-decoration: none; }
    .back:hover { color: #f0e1b4; }
    main { padding: 2.8rem 0 3.6rem; }
    h1 { font-family: "Cormorant Garamond", serif; font-size: clamp(1.8rem, 4vw, 2.6rem); color: var(--gold-light); margin-bottom: 0.8rem; line-height: 1.1; }
    .post-meta { color: var(--muted); font-size: 0.72rem; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 1.8rem; }
    h2 { font-family: "Cormorant Garamond", serif; font-size: 1.4rem; color: var(--gold-light); margin: 2rem 0 0.6rem; }
    p, li { font-size: 0.9rem; color: #d7d7d7; margin-bottom: 0.9rem; }
    ul { padding-left: 1.4rem; }
    footer { border-top: 1px solid var(--border); padding: 1.3rem 0 1.8rem; background: #090909; margin-top: 3rem; }
    .footer-row { display: flex; justify-content: center; gap: 1rem; flex-wrap: wrap; font-size: 0.7rem; color: #8e8e8e; letter-spacing: 0.1em; text-transform: uppercase; }
    .footer-row a:hover { color: #f0e1b4; }
  </style>
</head>
<body>
  <header>
    <div class="container topbar">
      <a class="brand" href="/">The Gold Index Club</a>
      <a class="back" href="/blog">&larr; All posts</a>
    </div>
  </header>

  <main>
    <article class="container">
      <h1>POST TITLE</h1>
      <p class="post-meta">Published POST DATE · By Percival</p>

      <p>POST INTRO PARAGRAPH.</p>

      <h2>Section heading</h2>
      <p>Body copy for the first section.</p>
    </article>
  </main>

  <footer>
    <div class="container">
      <div class="footer-row">
        <a href="/">Home</a>
        <a href="/blog">Blog</a>
        <a href="/wins">Big Wins</a>
        <a href="/#payment">Pricing</a>
        <a href="/#contact">Contact</a>
        <a href="/privacy">Privacy</a>
        <a href="/terms">Terms</a>
        <a href="/refunds">Refunds</a>
      </div>
    </div>
  </footer>
</body>
</html>
