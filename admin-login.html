<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Admin sign-in | The Gold Index Club</title>
  <link rel="canonical" href="https://thegoldindexclub.co.za/admin-login" />
  <link rel="icon" type="image/png" href="assets/logo-favicon.png" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.25rem;
      background: #0a0a0a;
      color: #e0e0e0;
      font-family: system-ui, -apple-system, sans-serif;
      line-height: 1.5;
    }
    .card {
      width: min(100%, 22rem);
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      background: #111;
      padding: 1.35rem 1.25rem;
    }
    h1 {
      font-family: Georgia, "Times New Roman", serif;
      font-size: 1.45rem;
      color: #f6f6f6;
      margin-bottom: 0.5rem;
      font-weight: 600;
    }
    p.hint {
      font-size: 0.78rem;
      color: #9a9a9a;
      margin-bottom: 1rem;
    }
    label {
      display: block;
      font-size: 0.65rem;
      color: #888;
      margin-bottom: 0.35rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    input[type="password"] {
      width: 100%;
      padding: 0.55rem 0.65rem;
      background: #131313;
      border: 1px solid #2f2f2f;
      border-radius: 8px;
      color: #f0f0f0;
      font-size: 0.9rem;
      margin-bottom: 0.65rem;
    }
    input:focus {
      outline: none;
      border-color: rgba(201, 168, 76, 0.45);
    }
    button {
      width: 100%;
      padding: 0.55rem;
      border: 1px solid rgba(201, 168, 76, 0.5);
      border-radius: 8px;
      background: transparent;
      color: #ecd38f;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      cursor: pointer;
      margin-top: 0.25rem;
    }
    button:hover {
      border-color: #ecd38f;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    .err {
      min-height: 1.2em;
      font-size: 0.75rem;
      color: #ef5350;
      margin-bottom: 0.5rem;
    }
    a.home {
      display: inline-block;
      margin-top: 1rem;
      font-size: 0.8rem;
      color: #c9a84c;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Admin access</h1>
    <p class="hint">Enter the server-configured admin password. Then use your member login on the next page.</p>
    <label for="pw">Password</label>
    <input type="password" id="pw" autocomplete="current-password" />
    <p class="err" id="err" role="alert"></p>
    <button type="button" id="go">Continue</button>
    <a class="home" href="/">← Home</a>
  </div>
  <script>
    (function () {
      var params = new URLSearchParams(window.location.search);
      var next = params.get("next") || "/admin";
      if (next.indexOf("/") !== 0) next = "/admin";

      var pw = document.getElementById("pw");
      var err = document.getElementById("err");
      var go = document.getElementById("go");

      function submit() {
        err.textContent = "";
        go.disabled = true;
        fetch("/api/admin-login", {
          method: "POST",
          headers: { "Content-Type": "application/json", Accept: "application/json" },
          body: JSON.stringify({ password: pw.value }),
        })
          .then(function (res) {
            return res.text().then(function (text) {
              var data = {};
              try {
                data = text ? JSON.parse(text) : {};
              } catch (e) {
                data = { error: text || res.statusText || "Error " + res.status };
              }
              return { ok: res.ok, data: data };
            });
          })
          .then(function (r) {
            if (r.ok && r.data && r.data.ok) {
              window.location.href = next;
              return;
            }
            err.textContent = (r.data && r.data.error) || "Could not sign in.";
            go.disabled = false;
          })
          .catch(function () {
            err.textContent = "Network error.";
            go.disabled = false;
          });
      }

      go.addEventListener("click", submit);
      pw.addEventListener("keydown", function (e) {
        if (e.key === "Enter") submit();
      });
      pw.focus();
    })();
  </script>
</body>
</html>
