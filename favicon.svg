<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <!-- Metallic gold gradient left-to-right for body sheen -->
    <linearGradient id="body1" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#a07830"/>
      <stop offset="35%"  stop-color="#e8c97a"/>
      <stop offset="65%"  stop-color="#c9a84c"/>
      <stop offset="100%" stop-color="#8a6020"/>
    </linearGradient>
    <linearGradient id="body2" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#8a6020"/>
      <stop offset="35%"  stop-color="#d4a843"/>
      <stop offset="65%"  stop-color="#f0d878"/>
      <stop offset="100%" stop-color="#a07830"/>
    </linearGradient>
    <!-- Subtle glow filter -->
    <filter id="glow" x="-40%" y="-20%" width="180%" height="140%">
      <feGaussianBlur stdDeviation="1.2" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Left candle — tall bullish -->
  <!-- Wick -->
  <line x1="9" y1="3" x2="9" y2="28"
        stroke="#c9a84c" stroke-width="1.1" stroke-linecap="round" opacity="0.7"/>
  <!-- Body -->
  <rect x="4.5" y="8" width="9" height="16" rx="0.8"
        fill="url(#body1)" filter="url(#glow)"/>

  <!-- Right candle — shorter, slightly offset -->
  <!-- Wick -->
  <line x1="23" y1="6" x2="23" y2="29"
        stroke="#c9a84c" stroke-width="1.1" stroke-linecap="round" opacity="0.7"/>
  <!-- Body -->
  <rect x="18.5" y="13" width="9" height="11" rx="0.8"
        fill="url(#body2)" filter="url(#glow)"/>
</svg>
