        stroke="#c9a84c" stroke-width="1.1" stroke-linecap="round"/>
  <rect x="4.5" y="8" width="9" height="16" rx="0.8"
        fill="none" stroke="#c9a84c" stroke-width="1.4"/>

  <!-- Right candle — shorter -->
  <line x1="23" y1="6" x2="23" y2="29"
        stroke="#c9a84c" stroke-width="1.1" stroke-linecap="round"/>
  <rect x="18.5" y="13" width="9" height="11" rx="0.8"
        fill="none" stroke="#c9a84c" stroke-width="1.4"/>

</svg>
